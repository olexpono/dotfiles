# use 256 term for pretty colors
set -g default-terminal "xterm-256color"
set -g status-bg black
set -g status-fg green
set-window-option -g clock-mode-colour brightyellow

# increase scroll-back history
set -g history-limit 1000000

# use vim key bindings
setw -g mode-keys vi

# enable mouse
set -g mouse on

# decrease command delay (increases vim responsiveness)
set -sg escape-time 0

# increase repeat time for repeatable commands
set -g repeat-time 1000

# start window index at 1
set -g base-index 1

# start pane index at 1
setw -g pane-base-index 1

# highlight window when it has new activity
setw -g monitor-activity on
set -g visual-activity on

# re-number windows when one is closed
set -g renumber-windows on

# enable pbcopy and pbpaste
# https://github.com/ChrisJohnsen/tmux-MacOSX-pasteboard/blob/master/README.md
set-option -g default-command "zsh"

###########################
#  Key Bindings
###########################

# tmux prefix
unbind C-b
set -g prefix C-f
bind-key f send-prefix

# buffer
bind space choose-buffer

# window splitting
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# create 25% lower split
unbind t
bind t split-window -v -c "#{pane_current_path}"

# quickly switch panes
unbind ^F
bind ^F select-pane -t :.+

# navigate panes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# zoom into one pane
unbind +
bind + \
  new-window -d -n tmux-zoom 'clear && echo TMUX ZOOM && read' \;\
  swap-pane -s tmux-zoom.0 \;\
  select-window -t tmux-zoom

unbind -
bind - \
  last-window \;\
  swap-pane -s tmux-zoom.0 \;\
  kill-window -t tmux-zoom

# Ctrl+] to cycle through window background colors
bind -n C-] run-shell ' \
  i=$(tmux show-environment -g THEME_INDEX 2>/dev/null | cut -d= -f2); \
  i=${i:-0}; \
  i=$(( (i + 1) % 4 )); \
  tmux set-environment -g THEME_INDEX $i; \
  current=$(tmux display-message -p "#{window_name}"); \
  suffix=$(echo "$current" | grep -o " \[.*" || true); \
  case $i in \
    0) tmux rename-window "default${suffix}"; tmux set-window-option @THEMED_WORKSPACE default ;; \
    1) tmux rename-window "teal${suffix}"; tmux set-window-option @THEMED_WORKSPACE teal ;; \
    2) tmux rename-window "blue${suffix}"; tmux set-window-option @THEMED_WORKSPACE blue ;; \
    3) tmux rename-window "magenta${suffix}"; tmux set-window-option @THEMED_WORKSPACE magenta ;; \
  esac'

# Status bar: colorize active window tab based on theme name
set -g window-status-current-format '#{?#{m:teal*,#{window_name}},#[bg=colour23 fg=colour255 bold] #I:#W ,#{?#{m:blue*,#{window_name}},#[bg=colour17 fg=colour255 bold] #I:#W ,#{?#{m:magenta*,#{window_name}},#[bg=colour53 fg=colour255 bold] #I:#W ,#[bg=colour147 fg=colour232 bold] #I:#W }}}'
set -g window-status-format ' #I:#W '
